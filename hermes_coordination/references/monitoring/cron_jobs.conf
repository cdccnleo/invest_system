# cron_jobs.conf
# Hermes Agent定时任务配置（cron格式）
# 配合补丁2（可观测性）+ 方案2/5（事件首席分析师+批量吸收）
# 创建时间: 2026-06-11

# ============================================================
# 环境变量（请先在 crontab 中设置）
# ============================================================
# PYTHON_PATH=/mnt/c/PythonProject/invest_system/.venv/bin/python
# INVESTPILOT_HOME=/mnt/c/PythonProject/invest_system
# HERMES_TOKEN=xxx (从 .env 加载)

# ============================================================
# 方案2: 事件首席分析师（每晚22:00）
# ============================================================
0 22 * * * cd /mnt/c/PythonProject/invest_system && /mnt/c/PythonProject/invest_system/.venv/bin/python -m scripts.hermes_event_analyst --live >> /mnt/c/PythonProject/invest_system/logs/cron_event_analyst.log 2>&1

# ============================================================
# 方案5: 批量吸收新报告（每晚22:30）
# ============================================================
30 22 * * * cd /mnt/c/PythonProject/invest_system && /mnt/c/PythonProject/invest_system/.venv/bin/python -m scripts.hermes_kb_ingest --live >> /mnt/c/PythonProject/invest_system/logs/cron_kb_ingest.log 2>&1

# ============================================================
# 方案1: Skill ↔ TAMF双向同步（盘后18:00 + 18:30）
# ============================================================
0 18 * * * cd /mnt/c/PythonProject/invest_system && /mnt/c/PythonProject/invest_system/.venv/bin/python -m scripts.agent_sync --direction=hermes_to_tamf >> /mnt/c/PythonProject/invest_system/logs/cron_sync.log 2>&1
30 18 * * * cd /mnt/c/PythonProject/invest_system && /mnt/c/PythonProject/invest_system/.venv/bin/python -m scripts.agent_sync --direction=tamf_to_hermes >> /mnt/c/PythonProject/invest_system/logs/cron_sync.log 2>&1

# ============================================================
# 方案6: 周度策略复盘（每周日20:00）
# ============================================================
0 20 * * 0 cd /mnt/c/PythonProject/invest_system && /mnt/c/PythonProject/invest_system/.venv/bin/python -m scripts.hermes_portfolio_copilot weekly_review >> /mnt/c/PythonProject/invest_system/logs/cron_weekly.log 2>&1

# ============================================================
# Watchdog监控（启动后持续运行，不通过cron）
# ============================================================
# 启动命令: bash references/monitoring/watch_hermes_agent.sh &

# ============================================================
# 数据备份（每日23:00）
# ============================================================
0 23 * * * cd /mnt/c/PythonProject/invest_system && tar -czf backups/daily/hermes_skills_$(date +\%Y\%m\%d).tar.gz ~/.hermes/skills/investing/ >> /mnt/c/PythonProject/invest_system/logs/cron_backup.log 2>&1

# ============================================================
# 日志清理（每周日凌晨3:00）
# ============================================================
0 3 * * 0 find /mnt/c/PythonProject/invest_system/logs/ -name "*.log" -mtime +90 -delete >> /mnt/c/PythonProject/invest_system/logs/cron_cleanup.log 2>&1

# ============================================================
# 说明
# ============================================================
# 安装方法:
# 1. 编辑 crontab: crontab -e
# 2. 复制以上所有 cron 行（除注释外）
# 3. 重启cron: sudo systemctl restart cron
#
# 验证方法:
# - crontab -l (查看已安装的任务)
# - tail -f /mnt/c/PythonProject/invest_system/logs/cron_*.log (查看执行日志)
#
# 故障排查:
# - 检查 PYTHON_PATH 是否正确
# - 检查 .env 中的 HERMES_TOKEN 是否设置
# - 检查 logs/ 目录权限 (应为 755)